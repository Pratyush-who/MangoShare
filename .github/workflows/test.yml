name: Unit Tests

on:
  pull_request:
    branches: [ main ]

jobs:
  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Web
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Test
        run: npm test
