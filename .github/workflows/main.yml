name: MangoShare CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

  backend-check:
    name: Backend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MangoShare-Socket

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: MangoShare-Socket/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend type check
        run: npm run check

  email-notification:
    name: EmailJS Notification
    runs-on: ubuntu-latest
    needs:
      - frontend-lint
      - backend-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Send success email
        env:
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          REPOSITORY_NAME: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_AUTHOR: ${{ github.actor }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          curl -sS -X POST "https://api.emailjs.com/api/v1.0/email/send" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "service_id": "${EMAILJS_SERVICE_ID}",
            "template_id": "${EMAILJS_TEMPLATE_ID}",
            "user_id": "${EMAILJS_PUBLIC_KEY}",
            "accessToken": "${EMAILJS_PRIVATE_KEY}",
            "template_params": {
              "repository": "${REPOSITORY_NAME}",
              "branch": "${BRANCH_NAME}",
              "commit_sha": "${COMMIT_SHA}",
              "commit_author": "${COMMIT_AUTHOR}",
              "commit_url": "${COMMIT_URL}"
            }
          }
          EOF
          )"
